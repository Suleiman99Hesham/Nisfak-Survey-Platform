services:
  db:
    image: postgres:16-alpine
    command: postgres -c max_connections=500
    environment:
      POSTGRES_DB: survey_platform
      POSTGRES_USER: survey_user
      POSTGRES_PASSWORD: survey_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U survey_user -d survey_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/admin/')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  celery_worker:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    command: celery -A config worker -l info --concurrency=2
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      web:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
